<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.35);
    cursor: crosshair;
    user-select: none;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }
  #hint {
    position: fixed; top: 18px; left: 50%;
    transform: translateX(-50%);
    background: rgba(15,15,17,0.9);
    color: #e7e7ea; font-size: 12px;
    padding: 6px 16px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none; white-space: nowrap;
  }
  #sel {
    position: fixed;
    border: 2px solid #d97757;
    background: rgba(217,119,87,0.08);
    display: none;
    pointer-events: none;
  }
  #sel::before {
    content: attr(data-size);
    position: absolute; bottom: calc(100% + 5px); left: 0;
    background: rgba(217,119,87,0.9);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    white-space: nowrap;
  }
  /* Corner handles */
  #sel::after {
    content: '';
    position: absolute; inset: -1px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.25) inset,
      0 0 0 9999px rgba(0,0,0,0.0);
  }
</style>
</head>
<body>
<div id="hint">Click and drag to select a region &nbsp;·&nbsp; Esc to cancel</div>
<div id="sel"></div>
<script src="./screenshot-overlay.js"></script>
</body>
</html>
