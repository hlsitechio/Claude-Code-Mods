name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Bigger features should be discussed before a PR. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: Context first, solution second. What workflow is awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? UI sketch / pseudo-API welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this + why they're worse

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - Renderer UI (app.js / style.css)
        - Electron main process
        - ccm-browser MCP tool surface
        - Skills / Hooks / CLAUDE.md
        - Build / packaging
        - Documentation
        - Other
