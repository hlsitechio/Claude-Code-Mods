name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint + Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node 18 dropped: Vite 8 requires Node 20.19+/22.12+ (uses the
        # CustomEvent global, added in Node 19). Node 18 also hit EOL
        # 2025-04-30.
        node: ['20', '22']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Syntax-check all JS/MJS
        run: npm run lint

      - name: Vite renderer build
        run: npm run build
